name: Security Platform CI

on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |

          python -m pip install --upgrade pip

          pip install -r dashboard-app/requirements.txt

      - name: Validate Python Imports
        run: |

          python -m py_compile dashboard-app/app.py

      - name: Docker Build
        run: |

          docker build \
          -f dashboard-app/Dockerfile \
          -t enterprise-soc .
