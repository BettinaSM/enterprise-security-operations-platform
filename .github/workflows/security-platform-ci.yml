name: Enterprise Security Platform CI

on:

  push:

    branches:
      - main

  pull_request:

    branches:
      - main

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |

          python -m pip install --upgrade pip

          pip install -r dashboard-app/requirements.txt

      - name: Validate Python Imports
        run: |

          python -m py_compile dashboard-app/app.py

      - name: Validate Parsers
        run: |

          find dashboard-app/parsers -name "*.py" -exec python -m py_compile {} \;

      - name: Docker Build Validation
        run: |

          docker build -t enterprise-soc-platform .
